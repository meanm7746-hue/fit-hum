<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Fit Hub Premium Store</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:Arial,Helvetica,sans-serif;
background:#0b0b0c;
color:#fff;
}

/* HEADER */
header{
position:fixed;
top:0;left:0;right:0;
height:74px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 22px;
background:rgba(0,0,0,.58);
backdrop-filter:blur(12px);
z-index:1000;
border-bottom:1px solid rgba(255,255,255,.05);
}

.logo{
font-size:28px;
font-weight:900;
cursor:pointer;
letter-spacing:2px;
background:linear-gradient(90deg,#fff,#d6b36a,#fff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.shopbtn{
padding:12px 18px;
border:none;
border-radius:14px;
font-weight:900;
cursor:pointer;
background:linear-gradient(135deg,#d6b36a,#8e6a2f);
}

/* SECTION */
.section{padding:100px 20px 55px}
.title{
font-size:34px;
font-weight:900;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:18px;
}

.card{
background:#141416;
border-radius:24px;
overflow:hidden;
border:1px solid rgba(255,255,255,.05);
cursor:pointer;
}

.card img{
width:100%;
height:300px;
object-fit:cover;
}

.card-body{padding:16px}
.card h3{font-size:20px;margin-bottom:8px}

.price{
font-size:24px;
font-weight:900;
color:#d6b36a;
}

/* MODAL */
.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.72);
display:none;
justify-content:center;
align-items:center;
padding:18px;
z-index:3000;
overflow:auto;
}

.overlay.show{display:flex}

.modal{
width:100%;
max-width:520px;
background:#141416;
border-radius:28px;
padding:24px;
border:1px solid rgba(255,255,255,.06);
}

.modal img{
width:100%;
height:280px;
object-fit:cover;
border-radius:18px;
margin-bottom:14px;
}

.modal h2{font-size:28px;margin-bottom:8px}
.modal p{opacity:.82;margin-bottom:10px;line-height:1.6}

.size-wrap{
display:flex;
gap:8px;
flex-wrap:wrap;
margin:10px 0;
}

.size{
padding:10px 14px;
border-radius:12px;
background:#202024;
font-size:14px;
}

.row{
display:flex;
gap:10px;
margin-top:14px;
}

.row button{
flex:1;
padding:13px;
border:none;
border-radius:14px;
font-weight:900;
cursor:pointer;
}

.cancel{background:#2a2a2f;color:#fff}
.confirm{background:linear-gradient(135deg,#d6b36a,#8e6a2f)}

/* ADMIN */
.admin{
position:fixed;
top:0;
right:-390px;
width:380px;
height:100%;
background:#111214;
z-index:4000;
padding:18px;
overflow:auto;
transition:.3s;
border-left:1px solid rgba(255,255,255,.05);
}

.admin.show{right:0}

.admin h3{font-size:24px;margin-bottom:12px}

.admin input,.admin textarea{
width:100%;
padding:12px;
border:none;
border-radius:14px;
background:#202024;
color:#fff;
margin-bottom:10px;
}

.admin textarea{height:80px;resize:none}

.admin button{
width:100%;
padding:12px;
border:none;
border-radius:14px;
font-weight:900;
cursor:pointer;
margin-bottom:8px;
background:linear-gradient(135deg,#d6b36a,#8e6a2f);
}

.small{font-size:12px;opacity:.7}

@media(max-width:700px){
.admin{width:100%;right:-100%}
}
</style>
</head>
<body>

<header>
<div class="logo" onclick="openAdmin()">FIT HUB</div>
<button class="shopbtn">SHOP NOW</button>
</header>

<section class="section">
<div class="title">Trending Collection</div>
<div class="grid" id="grid"></div>
</section>

<!-- PRODUCT DETAILS -->
<div class="overlay" id="productBox">
<div class="modal">
<img id="dImg">
<h2 id="dName"></h2>
<p id="dPrice"></p>
<p><b>Fabric:</b> <span id="dFabric"></span></p>
<p><b>Description:</b> <span id="dDesc"></span></p>

<div class="size-wrap" id="dSizes"></div>

<div class="row">
<button class="cancel" onclick="closeProduct()">Close</button>
<button class="confirm" onclick="buyNow()">Buy Now</button>
</div>
</div>
</div>

<!-- ADMIN -->
<div class="admin" id="adminPanel">

<h3>Admin Edit Product</h3>

<input id="pName" placeholder="Product Name">
<input id="pPrice" placeholder="Price">
<input id="pImg" placeholder="Image URL">
<input id="pFabric" placeholder="Fabric">
<input id="pSizes" placeholder="Sizes (S,M,L,XL)">
<textarea id="pDesc" placeholder="Description"></textarea>

<button onclick="saveProduct()">Save Product</button>
<button onclick="closeAdmin()">Close</button>

<div class="small">Tap product card first to edit that product.</div>

</div>

<script>
let products = [
{
name:"Royal Black Shirt",
price:"799",
img:"https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf?auto=format&fit=crop&w=900&q=80",
fabric:"100% Premium Cotton",
sizes:"M,L,XL,XXL",
desc:"Slim fit premium black shirt with elegant finish."
},
{
name:"Urban White Tee",
price:"699",
img:"https://images.unsplash.com/photo-1521572267360-ee0c2909d518?auto=format&fit=crop&w=900&q=80",
fabric:"Soft Cotton Blend",
sizes:"S,M,L,XL",
desc:"Clean everyday luxury white t-shirt."
}
];

let current = 0;

function render(){

grid.innerHTML="";

products.forEach((p,i)=>{

grid.innerHTML += `
<div class="card" onclick="viewProduct(${i})">
<img src="${p.img}">
<div class="card-body">
<h3>${p.name}</h3>
<div class="price">₹${p.price}</div>
</div>
</div>
`;

});

}

function viewProduct(i){

current=i;
let p=products[i];

dImg.src=p.img;
dName.innerText=p.name;
dPrice.innerText="₹"+p.price;
dFabric.innerText=p.fabric;
dDesc.innerText=p.desc;

dSizes.innerHTML="";
p.sizes.split(",").forEach(s=>{
dSizes.innerHTML += `<div class="size">${s}</div>`;
});

productBox.classList.add("show");

}

function closeProduct(){
productBox.classList.remove("show");
}

function buyNow(){

let p=products[current];

let msg=`Order

Product: ${p.name}
Price: ₹${p.price}
Size: Select in chat`;

window.open("https://wa.me/917736789255?text="+encodeURIComponent(msg));
}

/* ADMIN */

function openAdmin(){

let p=products[current];

pName.value=p.name;
pPrice.value=p.price;
pImg.value=p.img;
pFabric.value=p.fabric;
pSizes.value=p.sizes;
pDesc.value=p.desc;

adminPanel.classList.add("show");
}

function closeAdmin(){
adminPanel.classList.remove("show");
}

function saveProduct(){

products[current]={
name:pName.value,
price:pPrice.value,
img:pImg.value,
fabric:pFabric.value,
sizes:pSizes.value,
desc:pDesc.value
};

render();
closeAdmin();
alert("Updated");
}

render();
</script>

</body>
</html>
