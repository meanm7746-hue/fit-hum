<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fit Hub</title>
<style>
body{margin:0;font-family:Arial;background:#f1f3f6;}
header{background:#2874f0;color:#fff;padding:15px;text-align:center;font-size:28px;font-weight:bold;}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px;padding:15px;}
.card{background:#fff;padding:15px;border-radius:10px;text-align:center;}
.card img{width:100%;height:180px;object-fit:cover;border-radius:8px;}
input,select{width:90%;padding:8px;margin:5px 0;}
button{background:#2874f0;color:#fff;border:none;padding:10px 15px;border-radius:6px;cursor:pointer;}
.price{color:green;font-weight:bold;}
</style>
</head>
<body>

<header>Fit Hub</header>

<div class="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf">
<h3>Black Shirt</h3>
<p class="price">₹799</p>

<form action="https://formspree.io/f/xrejyrrd" method="POST">
<input type="hidden" name="Product" value="Black Shirt">
<input type="text" name="Name" placeholder="Your Name" required>
<input type="text" name="Phone" placeholder="Phone Number" required>
<select name="Size">
<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>
</select>
<button type="submit">Buy Now</button>
</form>

</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1521572267360-ee0c2909d518">
<h3>White T-Shirt</h3>
<p class="price">₹599</p>

<form action="https://formspree.io/f/xrejyrrd" method="POST">
<input type="hidden" name="Product" value="White T-Shirt">
<input type="text" name="Name" placeholder="Your Name" required>
<input type="text" name="Phone" placeholder="Phone Number" required>
<select name="Size">
<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>
</select>
<button type="submit">Buy Now</button>
</form>

</div>

</div>

</body>
</html>
