<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FIT HUB</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:Arial,Helvetica,sans-serif;
background:#07070a;
color:#fff;
overflow-x:hidden;
}
header{
position:sticky;
top:0;
z-index:1000;
display:flex;
justify-content:space-between;
align-items:center;
padding:16px 20px;
background:rgba(10,10,15,.85);
backdrop-filter:blur(12px);
border-bottom:1px solid rgba(255,255,255,.06);
}
.logo{
font-size:28px;
font-weight:900;
letter-spacing:2px;
cursor:pointer;
color:#9d4edd;
text-shadow:0 0 14px #9d4edd;
}
.btn{
padding:10px 16px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:700;
background:#9d4edd;
color:#fff;
box-shadow:0 0 14px rgba(157,78,221,.5);
}
.hero{
padding:60px 20px;
text-align:center;
background:linear-gradient(135deg,#09090d,#111122);
}
.hero h1{
font-size:42px;
margin-bottom:10px;
}
.hero p{
opacity:.8;
margin-bottom:18px;
}
.wrap{
padding:20px;
max-width:1200px;
margin:auto;
}
.topbar{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}
input{
padding:12px;
border:none;
border-radius:12px;
background:#17171f;
color:#fff;
flex:1;
min-width:220px;
}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:18px;
}
.card{
background:#121218;
border:1px solid rgba(255,255,255,.05);
border-radius:18px;
padding:14px;
transition:.2s;
}
.card:hover{
transform:translateY(-4px);
box-shadow:0 0 18px rgba(157,78,221,.22);
}
.img{
height:220px;
border-radius:14px;
background:linear-gradient(135deg,#1f1f2e,#292940);
display:flex;
align-items:center;
justify-content:center;
font-size:42px;
margin-bottom:12px;
}
.price{
font-size:22px;
font-weight:900;
color:#c77dff;
margin:8px 0;
}
.row{
display:flex;
gap:8px;
margin-top:10px;
}
.small{
flex:1;
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
background:#1c1c25;
color:#fff;
}
.admin{
position:fixed;
top:0;
right:-420px;
width:390px;
height:100%;
background:#0e0e14;
padding:18px;
transition:.3s;
z-index:3000;
overflow:auto;
border-left:1px solid rgba(255,255,255,.05);
}
.admin.show{right:0}
.admin h2{
margin-bottom:14px;
color:#c77dff;
}
.admin input{
width:100%;
margin-bottom:10px;
}
.notice{
font-size:12px;
opacity:.65;
margin-top:8px;
}
footer{
padding:30px;
text-align:center;
opacity:.6;
}
</style>
</head>
<body>

<header>
<div class="logo" id="logo">FIT HUB</div>
<button class="btn" onclick="showCart()">Cart (<span id="cartCount">0</span>)</button>
</header>

<section class="hero">
<h1>Dark Luxury Neon Fashion</h1>
<p>Premium men fashion store built for style.</p>
<button class="btn" onclick="window.scrollTo({top:500,behavior:'smooth'})">Shop Now</button>
</section>

<div class="wrap">
<div class="topbar">
<input id="search" placeholder="Search products..." oninput="renderProducts()">
</div>

<div class="grid" id="grid"></div>
</div>

<div class="admin" id="adminPanel">
<h2>Admin Dashboard</h2>

<input id="pname" placeholder="Product Name">
<input id="pprice" placeholder="Price">
<input id="picon" placeholder="Emoji / Text (👕)">
<button class="btn" style="width:100%" onclick="addProduct()">Add Product</button>

<div class="notice">Tap FIT HUB logo 5 times to open admin.<br>Password: your custom password.</div>

<button class="small" style="margin-top:14px;width:100%" onclick="closeAdmin()">Close</button>
</div>

<footer>© FIT HUB 2026</footer>

<script>
let password="@yadh4u1";
let taps=0;

let products=JSON.parse(localStorage.getItem("fithub_products")||"[]");
if(products.length===0){
products=[];
saveProducts();
}

let cart=[];

document.getElementById("logo").onclick=()=>{
taps++;
if(taps>=5){
let p=prompt("Enter Admin Password");
if(p===password){
document.getElementById("adminPanel").classList.add("show");
}else{
alert("Wrong Password");
}
taps=0;
}
};

function saveProducts(){
localStorage.setItem("fithub_products",JSON.stringify(products));
}

function addProduct(){
let name=document.getElementById("pname").value.trim();
let price=document.getElementById("pprice").value.trim();
let icon=document.getElementById("picon").value.trim() || "👕";

if(!name || !price){
alert("Enter name & price");
return;
}

products.push({
id:Date.now(),
name:name,
price:price,
icon:icon
});

saveProducts();
renderProducts();

pname.value="";
pprice.value="";
picon.value="";
}

function deleteProduct(id){
products=products.filter(p=>p.id!==id);
saveProducts();
renderProducts();
}

function addCart(id){
cart.push(id);
document.getElementById("cartCount").innerText=cart.length;
}

function showCart(){
alert("Items in cart: "+cart.length);
}

function renderProducts(){
let q=document.getElementById("search").value.toLowerCase();
let grid=document.getElementById("grid");
grid.innerHTML="";

let filtered=products.filter(p=>p.name.toLowerCase().includes(q));

if(filtered.length===0){
grid.innerHTML="<p>No products yet. Add from admin panel.</p>";
return;
}

filtered.forEach(p=>{
grid.innerHTML+=`
<div class="card">
<div class="img">${p.icon}</div>
<h3>${p.name}</h3>
<div class="price">₹${p.price}</div>
<div class="row">
<button class="small" onclick="addCart(${p.id})">Add Cart</button>
<button class="small" onclick="buyNow('${p.name}','${p.price}')">Buy</button>
</div>
<div class="row">
<button class="small" onclick="deleteProduct(${p.id})">Delete</button>
</div>
</div>
`;
});
}

function buyNow(name,price){
let msg="Order%0AProduct: "+name+"%0APrice: ₹"+price;
window.open("https://wa.me/917736789255?text="+msg,"_blank");
}

function closeAdmin(){
document.getElementById("adminPanel").classList.remove("show");
}

renderProducts();
</script>

</body>
</html>
