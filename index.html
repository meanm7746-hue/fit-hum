<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FIT HUB V5 - TEXT NAV EDITION</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
    /* CSS Variables for Easy Theme Switching */
    :root { 
        --prm: #9d4edd; 
        --bg: #07070a; 
        --card: #121218; 
        --text: #ffffff;
        --border: rgba(255,255,255,0.05);
        --input: #1a1a24;
    }

    /* Light Theme Colors */
    [data-theme="light"] {
        --bg: #f4f4f9;
        --card: #ffffff;
        --text: #121218;
        --border: rgba(0,0,0,0.1);
        --input: #e8e8f0;
    }

    *{margin:0;padding:0;box-sizing:border-box; -webkit-tap-highlight-color: transparent; transition: background 0.3s, color 0.3s;}
    
    body{font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden;}

    header{
        position:sticky; top:0; display:flex; justify-content: space-between; align-items: center;
        padding:15px 25px; background:rgba(var(--bg), 0.8); backdrop-filter:blur(20px); 
        border-bottom:1px solid var(--border); z-index:1000;
    }
    .logo{font-size:22px; font-weight:900; color: var(--prm); text-shadow: 0 0 15px rgba(157,78,221,0.3);}
    
    .theme-toggle {
        font-size: 20px; cursor: pointer; background: var(--card); 
        padding: 8px; border-radius: 12px; border: 1px solid var(--border);
    }

    .wrap{max-width:1200px; margin:auto; padding:20px 20px 100px 20px;}

    /* SEARCH & CAT */
    .search-box{background: var(--input); border: 1px solid var(--border); padding: 14px; border-radius: 15px; width: 100%; color: var(--text); margin-bottom: 20px; outline: none;}
    .cat-scroll { display: flex; overflow-x: auto; gap: 12px; margin-bottom: 25px; scrollbar-width: none; }
    .cat-btn { background: var(--card); color: var(--text); opacity: 0.6; padding: 10px 22px; border-radius: 30px; border: 1px solid var(--border); cursor: pointer; white-space: nowrap; font-size: 13px; }
    .cat-btn.active { background: var(--prm); color: #fff; border-color: var(--prm); opacity: 1; }

    /* PRODUCT CARDS */
    .grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(160px, 1fr)); gap:18px;}
    .card{background: var(--card); border-radius:20px; overflow:hidden; border:1px solid var(--border); position:relative; box-shadow: 0 10px 20px rgba(0,0,0,0.05);}
    .card img{width:100%; height:230px; object-fit:cover;}
    .info{padding:15px;}
    .new-price{color: var(--prm); font-weight:900; font-size:17px;}

    /* BOTTOM NAV - NEW TEXT STYLE */
    .bottom-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: var(--card); backdrop-filter: blur(20px); display: flex; justify-content: space-around; padding: 10px 15px; border-radius: 25px; border: 1px solid var(--border); z-index: 4000; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
    .nav-item { color: var(--text); opacity: 0.6; font-size: 13px; cursor: pointer; font-weight: 600; text-transform: lowercase; }

    /* DETAIL VIEW */
    #detail-view { position: fixed; inset: 0; background: var(--bg); display: none; z-index: 5000; overflow-y: auto; }
    .detail-container { max-width: 500px; margin: auto; padding: 25px; }
    .slider { display: flex; overflow-x: auto; border-radius: 25px; gap: 10px; margin-bottom: 20px; scrollbar-width: none; }
    .slider img { width: 100%; flex-shrink: 0; height: 450px; object-fit: cover; }
    
    .btn-buy { background: var(--prm); color: #fff; width: 100%; padding: 16px; border-radius: 18px; border: none; font-weight: 900; cursor: pointer; margin-top: 10px; }
    .btn-video { background: var(--input); color: var(--text); width: 100%; padding: 12px; border-radius: 18px; border: 1px solid var(--border); margin-bottom: 10px; cursor: pointer; font-weight: bold; }

    /* ADMIN PANEL */
    .admin-drawer { position: fixed; top: 0; right: -100%; width: 100%; max-width: 350px; height: 100%; background: var(--bg); padding: 25px; transition: 0.4s; z-index: 6000; overflow-y: auto; border-left: 1px solid var(--border); }
    .admin-drawer.open { right: 0; }
    input, select, textarea { width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px; background: var(--input); color: var(--text); border: 1px solid var(--border); }
</style>
</head>
<body data-theme="dark">

<header>
    <div class="logo">FIT HUB</div>
    <div class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</div>
</header>

<div id="home-view" class="wrap">
    <input type="text" id="search" class="search-box" placeholder="Search premium clothes..." oninput="render()">
    <div class="cat-scroll" id="catTabs">
        <button class="cat-btn active" onclick="filterCat('All', this)">All</button>
        <button class="cat-btn" onclick="filterCat('Shirt', this)">Shirts</button>
        <button class="cat-btn" onclick="filterCat('Tshirt', this)">T-shirts</button>
    </div>
    <div class="grid" id="productGrid"></div>
</div>

<div class="bottom-nav">
    <div class="nav-item" onclick="location.reload()">home</div>
    <div class="nav-item" id="adminTrigger">settings</div>
</div>

<div id="detail-view">
    <div class="detail-container">
        <button onclick="closeDetail()" style="background:none; border:none; color:var(--text); font-size:24px; margin-bottom:15px;">✕</button>
        <div id="imageSlider" class="slider"></div>
        <button id="videoBtn" class="btn-video" style="display: none;" onclick="watchVideo()">📺 Watch Product Video</button>
        <h2 id="detailName" style="margin-bottom:5px;"></h2>
        <p id="detailPrice" style="color: var(--prm); font-size:24px; font-weight:900; margin-bottom:20px;"></p>
        <div id="orderForm">
            <select id="orderSize"><option value="">Select Size</option><option>S</option><option>M</option><option>L</option><option>XL</option></select>
            <input type="text" id="custName" placeholder="Full Name">
            <textarea id="custAddr" placeholder="Delivery Address with Pincode" rows="3"></textarea>
            <button class="btn-buy" onclick="sendOrder()">ORDER ON WHATSAPP</button>
        </div>
    </div>
</div>

<div class="admin-drawer" id="adminDrawer">
    <h3>Admin Settings</h3>
    <input id="pName" placeholder="Product Name">
    <input id="pOldPrice" placeholder="MRP">
    <input id="pPrice" placeholder="Offer Price">
    <select id="pCat"><option>Shirt</option><option>Tshirt</option></select>
    <select id="pStock"><option value="in">In Stock</option><option value="lim">Limited Stock</option><option value="out">Out of Stock</option></select>
    <input id="pVideo" placeholder="Video Link">
    <textarea id="pImg" placeholder="Image Links (Comma separated)" rows="3"></textarea>
    <button class="btn-buy" onclick="upload()">SAVE PRODUCT</button>
    <div id="adminList" style="margin-top:20px;"></div>
    <button onclick="toggleAdmin()" style="margin-top:20px; color:var(--text); opacity:0.5; background:none; border:none; width:100%;">Close</button>
</div>

<script>
    // Firebase and App Logic (unchanged from theme edition)
    const firebaseConfig = {
        apiKey: "AIzaSyC8bcL7IIgoRKQlp8XKYujbFySjCgEcsyY",
        authDomain: "fit-hub-a55e8.firebaseapp.com",
        databaseURL: "https://fit-hub-a55e8-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "fit-hub-a55e8",
        storageBucket: "fit-hub-a55e8.firebasestorage.app",
        appId: "1:247713917019:web:75c620862e6c738d37b77e"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('products');

    let allProducts = [];
    let curCat = "All";
    let activeP = null;

    function toggleTheme() {
        const body = document.body;
        const btn = document.getElementById('themeBtn');
        if (body.getAttribute('data-theme') === 'dark') {
            body.setAttribute('data-theme', 'light');
            btn.innerText = '☀️';
        } else {
            body.setAttribute('data-theme', 'dark');
            btn.innerText = '🌙';
        }
    }

    db.on('value', snap => {
        const data = snap.val();
        allProducts = [];
        for(let id in data) allProducts.push({id, ...data[id]});
        render();
        renderAdmin();
    });

    function filterCat(cat, btn) {
        curCat = cat;
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
    }

    function render() {
        const grid = document.getElementById('productGrid');
        const q = document.getElementById('search').value.toLowerCase();
        grid.innerHTML = "";
        allProducts.filter(p => p.name.toLowerCase().includes(q) && (curCat === "All" || p.cat === curCat)).forEach(p => {
            let img = p.img.split(',')[0].trim();
            grid.innerHTML += `
                <div class="card" onclick="openDetail('${p.id}')">
                    <img src="${img}">
                    <div class="info">
                        <h4>${p.name}</h4>
                        <span class="new-price">₹${p.price}</span>
                    </div>
                </div>`;
        });
    }

    function openDetail(id) {
        activeP = allProducts.find(x => x.id === id);
        document.getElementById('detail-view').style.display = "block";
        const s = document.getElementById('imageSlider');
        s.innerHTML = "";
        activeP.img.split(',').forEach(l => { s.innerHTML += `<img src="${l.trim()}">`; });
        document.getElementById('detailName').innerText = activeP.name;
        document.getElementById('detailPrice').innerText = "₹" + activeP.price;
        const vBtn = document.getElementById('videoBtn');
        vBtn.style.display = activeP.video ? "block" : "none";
    }

    function watchVideo() { if(activeP.video) window.open(activeP.video, '_blank'); }
    function closeDetail() { document.getElementById('detail-view').style.display = "none"; }

    function sendOrder() {
        const size = document.getElementById('orderSize').value;
        const name = document.getElementById('custName').value;
        const addr = document.getElementById('custAddr').value;
        if(!size || !name || !addr) return alert("Fill all details!");
        const msg = `*🛍️ NEW ORDER!*%0A*Item:* ${activeP.name}%0A*Size:* ${size}%0A*Details:* ${name}, ${addr}`;
        window.open(`https://wa.me/917736789255?text=${msg}`);
    }

    function upload() {
        const name = document.getElementById('pName').value, price = document.getElementById('pPrice').value, 
              oldPrice = document.getElementById('pOldPrice').value, cat = document.getElementById('pCat').value,
              stock = document.getElementById('pStock').value, video = document.getElementById('pVideo').value, img = document.getElementById('pImg').value;
        if(name && price && img) { db.push({name, oldPrice, price, cat, stock, video, img}); alert("Added!"); }
    }

    let clicks = 0;
    document.getElementById('adminTrigger').onclick = () => {
        clicks++; if(clicks >= 5) { if(prompt("Pass?") === "@yadh4u1") toggleAdmin(); clicks = 0; }
    };
    function toggleAdmin() { document.getElementById('adminDrawer').classList.toggle('open'); }
    function renderAdmin() {
        const list = document.getElementById('adminList'); list.innerHTML = "";
        allProducts.forEach(p => {
            list.innerHTML += `<div style="display:flex; justify-content:space-between; padding:10px; background:var(--input); border-radius:10px; margin-bottom:5px; font-size:11px;">
                <span>${p.name}</span><span style="color:red" onclick="del('${p.id}')">Del</span>
            </div>`;
        });
    }
    function del(id) { if(confirm("Delete?")) db.child(id).remove(); }
</script>
</body>
        </html>
