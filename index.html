<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Fit Hub | Online Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">The Fit Hub</div>
            <div class="search-bar">
                <input type="text" placeholder="Search for products, brands and more">
            </div>
            <div class="nav-links">
                <a href="#">Login</a>
                <a href="#">Cart</a>
            </div>
        </div>
    </nav>

    <div class="banner">
        <img src="https://images.unsplash.com/photo-1556906781-9a412961c28c?q=80&w=2000&auto=format&fit=crop" alt="Offer Banner">
    </div>

    <main class="container">
        <h2 class="section-title">Deals of the Day</h2>
        <div class="product-grid">
            
            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1521572267360-ee0c2909d518?q=80&w=1000&auto=format&fit=crop" alt="Tee">
                <div class="details">
                    <p class="p-name">Dry-Fit Training Tee</p>
                    <p class="p-price">₹499 <span class="old-price">₹999</span> <span class="discount">50% off</span></p>
                    <a href="https://wa.me/917736789255?text=Order:TrainingTee" class="buy-btn">Buy Now</a>
                </div>
            </div>

            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1591195853828-11db59a44f6b?q=80&w=1000&auto=format&fit=crop" alt="Shorts">
                <div class="details">
                    <p class="p-name">Performance Shorts</p>
                    <p class="p-price">₹399 <span class="old-price">₹799</span> <span class="discount">50% off</span></p>
                    <a href="https://wa.me/917736789255?text=Order:Shorts" class="buy-btn">Buy Now</a>
                </div>
            </div>

            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=1000&auto=format&fit=crop" alt="Shoes">
                <div class="details">
                    <p class="p-name">Pro Running Shoes</p>
                    <p class="p-price">₹1,299 <span class="old-price">₹2,499</span> <span class="discount">48% off</span></p>
                    <a href="https://wa.me/917736789255?text=Order:Shoes" class="buy-btn">Buy Now</a>
                </div>
            </div>

        </div>
    </main>

</body>
</html>
