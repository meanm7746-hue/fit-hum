<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FIT HUB</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:Arial,Helvetica,sans-serif;
background:#07070a;
color:#fff;
overflow-x:hidden;
}
header{
position:sticky;
top:0;
z-index:1000;
display:flex;
justify-content:space-between;
align-items:center;
padding:16px 20px;
background:rgba(10,10,15,.88);
backdrop-filter:blur(14px);
border-bottom:1px solid rgba(255,255,255,.06);
}
.logo{
font-size:30px;
font-weight:900;
letter-spacing:2px;
cursor:pointer;
color:#9d4edd;
text-shadow:0 0 14px #9d4edd;
}
.btn{
padding:10px 16px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:700;
background:linear-gradient(135deg,#7b2ff7,#9d4edd);
color:#fff;
box-shadow:0 0 14px rgba(157,78,221,.45);
}
.hero{
padding:70px 20px;
text-align:center;
background:linear-gradient(135deg,#09090d,#121226);
}
.hero h1{
font-size:44px;
margin-bottom:12px;
}
.hero p{
opacity:.82;
margin-bottom:20px;
}
.wrap{
max-width:1200px;
margin:auto;
padding:22px;
}
.searchbar{
margin-bottom:20px;
}
input{
width:100%;
padding:14px;
border:none;
border-radius:14px;
background:#15151e;
color:#fff;
font-size:15px;
}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:18px;
}
.card{
background:#121218;
border:1px solid rgba(255,255,255,.05);
border-radius:20px;
overflow:hidden;
transition:.25s;
}
.card:hover{
transform:translateY(-6px);
box-shadow:0 0 22px rgba(157,78,221,.2);
}
.img{
height:240px;
display:flex;
align-items:center;
justify-content:center;
font-size:52px;
background:linear-gradient(135deg,#1b1b2a,#2a2a40);
}
.info{
padding:16px;
}
.info h3{
font-size:20px;
margin-bottom:8px;
}
.price{
font-size:24px;
font-weight:900;
color:#c77dff;
margin-bottom:12px;
}
.row{
display:flex;
gap:10px;
}
.small{
flex:1;
padding:11px;
border:none;
border-radius:12px;
cursor:pointer;
background:#1d1d29;
color:#fff;
font-weight:700;
}
.admin{
position:fixed;
top:0;
right:-420px;
width:390px;
height:100%;
background:#0d0d13;
padding:20px;
transition:.3s;
z-index:4000;
overflow:auto;
border-left:1px solid rgba(255,255,255,.05);
}
.admin.show{right:0}
.admin h2{
margin-bottom:14px;
color:#c77dff;
}
.admin input{
margin-bottom:10px;
}
.note{
font-size:12px;
opacity:.65;
margin-top:8px;
line-height:1.5;
}
footer{
padding:30px;
text-align:center;
opacity:.6;
}
</style>
</head>
<body>

<header>
<div class="logo" id="logo">FIT HUB</div>
<button class="btn" onclick="showCart()">Cart (<span id="cartCount">0</span>)</button>
</header>

<section class="hero">
<h1>Dark Luxury Neon Fashion</h1>
<p>Premium men fashion collection for elite style.</p>
<button class="btn" onclick="window.scrollTo({top:500,behavior:'smooth'})">Explore</button>
</section>

<div class="wrap">
<div class="searchbar">
<input id="search" placeholder="Search products..." oninput="renderProducts()">
</div>

<div class="grid" id="grid"></div>
</div>

<!-- Hidden Admin -->
<div class="admin" id="adminPanel">
<h2>Admin Dashboard</h2>

<input id="pname" placeholder="Product Name">
<input id="pprice" placeholder="Price">
<input id="picon" placeholder="Emoji / Icon (👕)">
<button class="btn" style="width:100%" onclick="addProduct()">Add Product</button>

<p class="note">
Tap FIT HUB logo 5 times to open admin panel.
</p>

<button class="small" style="width:100%;margin-top:12px" onclick="closeAdmin()">Close</button>
</div>

<footer>© FIT HUB 2026</footer>

<script>
let adminPassword="@yadh4u1";
let taps=0;

let products=JSON.parse(localStorage.getItem("fithub_store")||"[]");

let cart=[];

if(products.length===0){
products=[
{id:1,name:"Royal Black Shirt",price:"799",icon:"👕"},
{id:2,name:"Urban White Tee",price:"699",icon:"👔"},
{id:3,name:"Classic Hoodie",price:"1199",icon:"🧥"}
];
saveProducts();
}

document.getElementById("logo").onclick=()=>{
taps++;
if(taps>=5){
let p=prompt("Enter Password");
if(p===adminPassword){
document.getElementById("adminPanel").classList.add("show");
}else{
alert("Wrong Password");
}
taps=0;
}
};

function saveProducts(){
localStorage.setItem("fithub_store",JSON.stringify(products));
}

function addProduct(){
let name=pname.value.trim();
let price=pprice.value.trim();
let icon=picon.value.trim() || "👕";

if(!name || !price){
alert("Enter product details");
return;
}

products.push({
id:Date.now(),
name:name,
price:price,
icon:icon
});

saveProducts();
renderProducts();

pname.value="";
pprice.value="";
picon.value="";
}

function renderProducts(){
let q=search.value.toLowerCase();
grid.innerHTML="";

let list=products.filter(p=>p.name.toLowerCase().includes(q));

list.forEach(p=>{
grid.innerHTML+=`
<div class="card">
<div class="img">${p.icon}</div>
<div class="info">
<h3>${p.name}</h3>
<div class="price">₹${p.price}</div>
<div class="row">
<button class="small" onclick="addCart(${p.id})">Add Cart</button>
<button class="small" onclick="buyNow('${p.name}','${p.price}')">Buy Now</button>
</div>
</div>
</div>
`;
});
}

function addCart(id){
cart.push(id);
cartCount.innerText=cart.length;
}

function showCart(){
alert("Cart Items: "+cart.length);
}

function buyNow(name,price){
let msg="Order%0AProduct: "+name+"%0APrice: ₹"+price;
window.open("https://wa.me/917736789255?text="+msg,"_blank");
}

function closeAdmin(){
adminPanel.classList.remove("show");
}

renderProducts();
</script>

</body>
</html>
