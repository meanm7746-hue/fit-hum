<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Fit Hub Premium</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Arial,Helvetica,sans-serif;
background:#0b0b0c;
color:#fff;
}

/* HEADER */
header{
position:fixed;
top:0;
left:0;
right:0;
height:76px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 24px;
background:rgba(0,0,0,.55);
backdrop-filter:blur(14px);
z-index:1000;
border-bottom:1px solid rgba(255,255,255,.06);
}

.logo{
font-size:28px;
font-weight:900;
letter-spacing:2px;
cursor:pointer;
background:linear-gradient(90deg,#fff,#d6b36a,#fff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.nav button{
padding:11px 16px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#d6b36a,#8e6a2f);
font-weight:800;
cursor:pointer;
}

/* HERO */
.hero{
height:100vh;
min-height:680px;
padding:120px 28px 50px;
display:flex;
align-items:center;
background:
linear-gradient(to right,rgba(0,0,0,.72),rgba(0,0,0,.2)),
url('https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?auto=format&fit=crop&w=1600&q=80') center/cover;
}

.hero-box{
max-width:620px;
}

.hero h1{
font-size:58px;
line-height:1.05;
margin-bottom:16px;
}

.hero p{
font-size:17px;
line-height:1.7;
opacity:.92;
margin-bottom:22px;
}

.hero button{
padding:14px 22px;
border:none;
border-radius:16px;
background:linear-gradient(135deg,#d6b36a,#8e6a2f);
font-weight:900;
cursor:pointer;
}

/* SECTION */
.section{
padding:55px 20px;
}

.title{
font-size:34px;
font-weight:900;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
}

.card{
background:#141416;
border-radius:24px;
overflow:hidden;
border:1px solid rgba(255,255,255,.05);
box-shadow:0 18px 36px rgba(0,0,0,.25);
}

.card img{
width:100%;
height:300px;
object-fit:cover;
}

.card-body{
padding:16px;
}

.card h3{
font-size:20px;
margin-bottom:8px;
}

.price{
font-size:24px;
font-weight:900;
color:#d6b36a;
margin-bottom:12px;
}

.buy{
width:100%;
padding:12px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#d6b36a,#8e6a2f);
font-weight:900;
cursor:pointer;
}

/* MODALS */
.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.72);
display:none;
justify-content:center;
align-items:center;
padding:18px;
z-index:2000;
}

.overlay.show{
display:flex;
}

.modal{
width:100%;
max-width:460px;
background:#141416;
border-radius:28px;
padding:24px;
border:1px solid rgba(255,255,255,.06);
}

.modal h2{
font-size:28px;
margin-bottom:10px;
}

.modal p{
opacity:.72;
margin-bottom:14px;
}

.modal input,
.modal textarea{
width:100%;
padding:13px;
border:none;
border-radius:14px;
background:#202024;
color:#fff;
margin-bottom:10px;
}

.modal textarea{
height:90px;
resize:none;
}

.actions{
display:flex;
gap:10px;
}

.actions button{
flex:1;
padding:13px;
border:none;
border-radius:14px;
font-weight:900;
cursor:pointer;
}

.cancel{background:#2a2a2f;color:#fff}
.confirm{background:linear-gradient(135deg,#d6b36a,#8e6a2f)}

/* ADMIN PANEL */
.admin-panel{
position:fixed;
right:20px;
bottom:20px;
width:320px;
background:#141416;
border-radius:24px;
padding:18px;
display:none;
z-index:3000;
border:1px solid rgba(255,255,255,.06);
box-shadow:0 20px 45px rgba(0,0,0,.35);
}

.admin-panel.show{
display:block;
}

.admin-panel h3{
margin-bottom:12px;
font-size:22px;
}

.admin-panel input,
.admin-panel textarea{
width:100%;
padding:12px;
border:none;
border-radius:14px;
background:#202024;
color:#fff;
margin-bottom:10px;
}

.admin-panel textarea{
height:80px;
resize:none;
}

.admin-panel button{
width:100%;
padding:12px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#d6b36a,#8e6a2f);
font-weight:900;
cursor:pointer;
margin-bottom:8px;
}

.small{
font-size:12px;
opacity:.65;
margin-top:6px;
}

@media(max-width:700px){
.hero h1{font-size:40px}
.admin-panel{
left:10px;
right:10px;
bottom:10px;
width:auto;
}
}
</style>
</head>
<body>

<header>
<div class="logo" onclick="secretTap()">FIT HUB</div>

<div class="nav">
<button onclick="scrollToProducts()">SHOP NOW</button>
</div>
</header>

<section class="hero">
<div class="hero-box">
<h1 id="heroTitle">Premium Fashion For Elite Style</h1>
<p id="heroDesc">
Luxury designs, premium comfort and timeless confidence.
</p>
<button onclick="scrollToProducts()">EXPLORE NOW</button>
</div>
</section>

<section class="section" id="products">
<div class="title">Trending Collection</div>

<div class="grid" id="productGrid">

<div class="card">
<img src="https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf?auto=format&fit=crop&w=900&q=80">
<div class="card-body">
<h3>Royal Black Shirt</h3>
<div class="price">₹799</div>
<button class="buy" onclick="openOrder('Royal Black Shirt','799')">BUY NOW</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1521572267360-ee0c2909d518?auto=format&fit=crop&w=900&q=80">
<div class="card-body">
<h3>Urban White Tee</h3>
<div class="price">₹699</div>
<button class="buy" onclick="openOrder('Urban White Tee','699')">BUY NOW</button>
</div>
</div>

</div>
</section>

<!-- ORDER MODAL -->
<div class="overlay" id="orderOverlay">
<div class="modal">
<h2>Place Order</h2>
<p id="orderProduct"></p>

<input id="custName" placeholder="Full Name">
<input id="custPhone" placeholder="Phone Number">
<textarea id="custAddress" placeholder="Delivery Address"></textarea>

<div class="actions">
<button class="cancel" onclick="closeOrder()">Cancel</button>
<button class="confirm" onclick="sendOrder()">Confirm</button>
</div>
</div>
</div>

<!-- ADMIN LOGIN -->
<div class="overlay" id="loginOverlay">
<div class="modal">
<h2>Admin Login</h2>
<p>Authorized access only</p>

<input type="password" id="adminPass" placeholder="Enter Password">

<div class="actions">
<button class="cancel" onclick="closeLogin()">Close</button>
<button class="confirm" onclick="loginAdmin()">Login</button>
</div>
</div>
</div>

<!-- ADMIN PANEL -->
<div class="admin-panel" id="adminPanel">
<h3>Admin Edit</h3>

<input id="editTitle" placeholder="Hero Title">
<textarea id="editDesc" placeholder="Hero Description"></textarea>

<button onclick="saveHero()">Save Content</button>
<button onclick="logoutAdmin()">Close Admin</button>

<div class="small">Customers cannot see this panel.</div>
</div>

<script>
let selectedProduct="";
let selectedPrice="";
let tapCount=0;

/* SECRET ADMIN OPEN */
function secretTap(){
tapCount++;

if(tapCount>=5){
document.getElementById("loginOverlay").classList.add("show");
tapCount=0;
}

setTimeout(()=>{tapCount=0},2000);
}

/* LOGIN */
function loginAdmin(){
let pass=document.getElementById("adminPass").value;

if(pass==="1234"){
closeLogin();
document.getElementById("adminPanel").classList.add("show");
}else{
alert("Wrong Password");
}
}

function logoutAdmin(){
document.getElementById("adminPanel").classList.remove("show");
}

function closeLogin(){
document.getElementById("loginOverlay").classList.remove("show");
}

/* EDIT HERO */
function saveHero(){
let t=document.getElementById("editTitle").value;
let d=document.getElementById("editDesc").value;

if(t) document.getElementById("heroTitle").innerText=t;
if(d) document.getElementById("heroDesc").innerText=d;

alert("Updated");
}

/* ORDER */
function openOrder(name,price){
selectedProduct=name;
selectedPrice=price;
document.getElementById("orderProduct").innerText=name+" • ₹"+price;
document.getElementById("orderOverlay").classList.add("show");
}

function closeOrder(){
document.getElementById("orderOverlay").classList.remove("show");
}

function sendOrder(){

let n=document.getElementById("custName").value.trim();
let p=document.getElementById("custPhone").value.trim();
let a=document.getElementById("custAddress").value.trim();

if(!n||!p||!a){
alert("Fill all details");
return;
}

let msg=`Order

Product: ${selectedProduct}
Price: ₹${selectedPrice}

Name: ${n}
Phone: ${p}
Address: ${a}`;

window.open("https://wa.me/917736789255?text="+encodeURIComponent(msg));

closeOrder();
}

/* SCROLL */
function scrollToProducts(){
document.getElementById("products").scrollIntoView();
}
</script>

</body>
  </html>
