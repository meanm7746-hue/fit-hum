<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FIT HUB V5 - FULL PAGE STORE</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:sans-serif; background:#07070a; color:#fff;}
    
    header{position:sticky; top:0; display:flex; justify-content:space-between; align-items:center; padding:15px 20px; background:rgba(10,10,15,0.9); backdrop-filter:blur(10px); border-bottom:1px solid #333; z-index:1000;}
    .logo{font-size:22px; font-weight:900; color:#9d4edd; cursor:pointer;}
    
    .wrap{max-width:1200px; margin:auto; padding:20px;}
    .grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(170px, 1fr)); gap:15px;}
    
    .card{background:#121218; border-radius:15px; overflow:hidden; position:relative; border:1px solid #222; cursor:pointer;}
    .badge{position:absolute; top:10px; left:10px; background:#ff206e; color:#fff; padding:4px 8px; border-radius:5px; font-size:11px; font-weight:bold; z-index:10;}
    
    .card img{width:100%; height:220px; object-fit:cover;}
    .info{padding:12px;}
    .old-price{text-decoration:line-through; color:#888; font-size:13px; margin-right:5px;}
    .new-price{color:#c77dff; font-weight:900; font-size:16px;}

    /* DETAIL PAGE VIEW */
    #detail-view {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #07070a; display: none; z-index: 2000; overflow-y: auto;
    }
    .detail-container { max-width: 500px; margin: auto; padding: 20px; }
    .detail-img { width: 100%; border-radius: 20px; margin-bottom: 20px; border: 1px solid #333; }
    
    .back-btn { background: #1a1a24; color: #fff; padding: 10px 20px; border-radius: 10px; border: none; cursor: pointer; margin-bottom: 15px; }
    
    input, textarea, select, .btn-main { width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px; border: none; outline: none; font-size: 14px; }
    input, textarea { background: #1a1a24; color: #fff; border: 1px solid #333; }
    .btn-main { background: #9d4edd; color: #fff; font-weight: bold; cursor: pointer; }

    .admin-drawer { position: fixed; top: 0; right: -100%; width: 320px; height: 100%; background: #0d0d13; padding: 20px; transition: 0.4s; z-index: 3000; border-left: 2px solid #9d4edd; }
    .admin-drawer.open { right: 0; }
</style>
</head>
<body>

<header>
    <div class="logo" id="logo">FIT HUB V5</div>
</header>

<div id="home-view" class="wrap">
    <input type="text" id="search" placeholder="Search products..." oninput="render()" style="background:#15151e; color:#fff; padding:15px; border-radius:12px; width:100%; border:1px solid #222; margin-bottom:20px;">
    <div class="grid" id="productGrid"></div>
</div>

<div id="detail-view">
    <div class="detail-container">
        <button class="back-btn" onclick="closeDetail()">⬅ Back to Store</button>
        <img id="detailImg" class="detail-img">
        <h2 id="detailName" style="color:#9d4edd;"></h2>
        <p id="detailPrice" style="color:#c77dff; font-weight:bold; font-size:20px; margin-bottom:15px;"></p>
        
        <div style="background:#121218; padding:20px; border-radius:15px;">
            <h3 style="margin-bottom:10px; font-size:16px;">Order Details:</h3>
            <select id="orderSize">
                <option value="">Select Size</option>
                <option>S</option><option>M</option><option>L</option><option>XL</option>
            </select>
            <input type="text" id="custName" placeholder="Full Name">
            <input type="tel" id="custPhone" placeholder="WhatsApp Number">
            <textarea id="custAddr" placeholder="Full Address with Landmark" rows="3"></textarea>
            <button class="btn-main" onclick="sendOrder()">Place Order via WhatsApp</button>
        </div>
    </div>
</div>

<div class="admin-drawer" id="adminDrawer">
    <h3>Add Product</h3>
    <input id="pName" placeholder="Product Name">
    <input id="pOldPrice" placeholder="MRP">
    <input id="pPrice" placeholder="Offer Price">
    <input id="pCat" placeholder="Category">
    <input id="pImg" placeholder="Image Link">
    <button class="btn-main" onclick="upload()">Save Product</button>
    <hr style="opacity:0.1; margin:20px 0;">
    <div id="adminList"></div>
    <button onclick="toggleAdmin()">Close</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC8bcL7IIgoRKQlp8XKYujbFySjCgEcsyY",
        authDomain: "fit-hub-a55e8.firebaseapp.com",
        databaseURL: "https://fit-hub-a55e8-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "fit-hub-a55e8",
        storageBucket: "fit-hub-a55e8.firebasestorage.app",
        appId: "1:247713917019:web:75c620862e6c738d37b77e"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('products');

    let allProducts = [];
    let activeProduct = null;

    db.on('value', snap => {
        const data = snap.val();
        allProducts = [];
        for(let id in data) allProducts.push({id, ...data[id]});
        render();
        renderAdmin();
    });

    function render() {
        const grid = document.getElementById('productGrid');
        grid.innerHTML = "";
        allProducts.forEach(p => {
            let discount = Math.round(((p.oldPrice - p.price) / p.oldPrice) * 100);
            grid.innerHTML += `
                <div class="card" onclick="openDetail('${p.id}')">
                    ${discount > 0 ? `<div class="badge">${discount}% OFF</div>` : ''}
                    <img src="${p.img}">
                    <div class="info">
                        <h4>${p.name}</h4>
                        <span class="old-price">₹${p.oldPrice}</span>
                        <span class="new-price">₹${p.price}</span>
                    </div>
                </div>`;
        });
    }

    function openDetail(id) {
        activeProduct = allProducts.find(x => x.id === id);
        document.getElementById('home-view').style.display = "none";
        document.getElementById('detail-view').style.display = "block";
        
        document.getElementById('detailImg').src = activeProduct.img;
        document.getElementById('detailName').innerText = activeProduct.name;
        document.getElementById('detailPrice').innerText = "Price: ₹" + activeProduct.price;
        window.scrollTo(0,0);
    }

    function closeDetail() {
        document.getElementById('home-view').style.display = "block";
        document.getElementById('detail-view').style.display = "none";
    }

    function sendOrder() {
        const size = document.getElementById('orderSize').value;
        const name = document.getElementById('custName').value;
        const phone = document.getElementById('custPhone').value;
        const addr = document.getElementById('custAddr').value;

        if(!size || !name || !phone || !addr) return alert("Fill all details!");

        const msg = `*🛍️ NEW ORDER confirmed!*%0A%0A*Product:* ${activeProduct.name}%0A*Price:* ₹${activeProduct.price}%0A*Size:* ${size}%0A%0A*Customer Info:*%0A*Name:* ${name}%0A*Phone:* ${phone}%0A*Address:* ${addr}`;
        window.open(`https://wa.me/917736789255?text=${msg}`);
    }

    function upload() {
        const name = document.getElementById('pName').value;
        const oldPrice = document.getElementById('pOldPrice').value;
        const price = document.getElementById('pPrice').value;
        const img = document.getElementById('pImg').value;
        if(name && price && img) {
            db.push({name, oldPrice, price, img});
            alert("Added!");
        }
    }

    let clicks = 0;
    document.getElementById('logo').onclick = () => {
        clicks++;
        if(clicks >= 5) { if(prompt("Pass?") === "@yadh4u1") toggleAdmin(); clicks = 0; }
    };
    function toggleAdmin() { document.getElementById('adminDrawer').classList.toggle('open'); }
    function renderAdmin() {
        const list = document.getElementById('adminList');
        list.innerHTML = "";
        allProducts.forEach(p => {
            list.innerHTML += `<div style="display:flex; justify-content:space-between; margin-top:5px;">
                <span>${p.name}</span><span style="color:red" onclick="del('${p.id}')">Del</span>
            </div>`;
        });
    }
    function del(id) { if(confirm("Delete?")) db.child(id).remove(); }
</script>
</body>
</html>
