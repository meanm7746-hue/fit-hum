<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fit Hub</title>

<style>
body{
margin:0;
font-family:system-ui, Arial;
background:#f7f7f7;
}

/* TOP NAV */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 25px;
background:white;
box-shadow:0 2px 12px rgba(0,0,0,0.08);
position:sticky;
top:0;
z-index:10;
}

.logo{
font-size:22px;
font-weight:700;
letter-spacing:1px;
}

.search{
width:40%;
padding:10px;
border:1px solid #ddd;
border-radius:8px;
}

/* HERO */
.hero{
margin:15px;
height:250px;
border-radius:15px;
background:linear-gradient(120deg,#111,#444);
color:white;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
font-weight:600;
}

/* CATEGORY */
.catbar{
display:flex;
gap:10px;
padding:10px 15px;
overflow-x:auto;
}

.cat{
background:white;
padding:10px 16px;
border-radius:25px;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
white-space:nowrap;
font-size:14px;
}

/* PRODUCTS */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:18px;
padding:15px;
}

.card{
background:white;
border-radius:14px;
overflow:hidden;
box-shadow:0 4px 15px rgba(0,0,0,0.08);
transition:0.25s;
}

.card:hover{
transform:translateY(-6px);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card h3{
margin:10px;
font-size:16px;
}

.price{
margin:0 10px;
color:#1a7f37;
font-weight:600;
}

.btn{
width:90%;
margin:10px 5%;
padding:10px;
border:none;
background:#ff3f6c;
color:white;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

.btn:hover{
background:#e6325f;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="topbar">
<div class="logo">FIT HUB</div>
<input class="search" placeholder="Search products, brands...">
</div>

<!-- HERO -->
<div class="hero">
Premium Fashion Collection
</div>

<!-- CATEGORIES -->
<div class="catbar">
<div class="cat">Men</div>
<div class="cat">Women</div>
<div class="cat">T-Shirts</div>
<div class="cat">Hoodies</div>
<div class="cat">Jeans</div>
<div class="cat">New Arrivals</div>
</div>

<!-- PRODUCTS -->
<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf">
<h3>Black Shirt</h3>
<p class="price">₹799</p>
<button class="btn" onclick="buy('Black Shirt',799)">BUY NOW</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1521572267360-ee0c2909d518">
<h3>White Shirt</h3>
<p class="price">₹699</p>
<button class="btn" onclick="buy('White Shirt',699)">BUY NOW</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1520975958225-0c7f5c0c1f2d">
<h3>Premium Hoodie</h3>
<p class="price">₹1299</p>
<button class="btn" onclick="buy('Hoodie',1299)">BUY NOW</button>
</div>

</div>

<script>
function buy(name,price){

let phone=prompt("Phone Number");
let address=prompt("Address");

let msg=`🛍 Order:
Product: ${name}
Price: ₹${price}
Phone: ${phone}
Address: ${address}`;

window.open("https://wa.me/917736789255?text="+encodeURIComponent(msg));
}
</script>

</body>
</html>
