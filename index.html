<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Fit Hub Premium Admin</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:Arial,Helvetica,sans-serif;
background:#0b0b0c;
color:#fff;
}

/* HEADER */
header{
position:fixed;
top:0;left:0;right:0;
height:74px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 22px;
background:rgba(0,0,0,.58);
backdrop-filter:blur(12px);
z-index:1000;
border-bottom:1px solid rgba(255,255,255,.05);
}

.logo{
font-size:28px;
font-weight:900;
cursor:pointer;
letter-spacing:2px;
background:linear-gradient(90deg,#fff,#d6b36a,#fff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.shopbtn{
padding:12px 18px;
border:none;
border-radius:14px;
font-weight:900;
cursor:pointer;
background:linear-gradient(135deg,#d6b36a,#8e6a2f);
}

/* HERO */
.hero{
min-height:92vh;
padding:120px 25px 60px;
display:flex;
align-items:center;
background:
linear-gradient(to right,rgba(0,0,0,.72),rgba(0,0,0,.2)),
url('https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?auto=format&fit=crop&w=1600&q=80') center/cover;
}

.hero-box{max-width:620px}

.hero h1{
font-size:56px;
line-height:1.05;
margin-bottom:14px;
}

.hero p{
font-size:17px;
line-height:1.7;
opacity:.9;
margin-bottom:20px;
}

.hero button{
padding:14px 22px;
border:none;
border-radius:16px;
font-weight:900;
cursor:pointer;
background:linear-gradient(135deg,#d6b36a,#8e6a2f);
}

/* SECTION */
.section{padding:55px 20px}
.title{
font-size:34px;
font-weight:900;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:18px;
}

.card{
background:#141416;
border-radius:24px;
overflow:hidden;
border:1px solid rgba(255,255,255,.05);
box-shadow:0 18px 36px rgba(0,0,0,.25);
}

.card img{
width:100%;
height:300px;
object-fit:cover;
}

.card-body{padding:16px}

.card h3{
font-size:20px;
margin-bottom:8px;
}

.price{
font-size:24px;
font-weight:900;
color:#d6b36a;
margin-bottom:12px;
}

.buy{
width:100%;
padding:12px;
border:none;
border-radius:14px;
font-weight:900;
cursor:pointer;
background:linear-gradient(135deg,#d6b36a,#8e6a2f);
}

/* MODAL */
.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.72);
display:none;
justify-content:center;
align-items:center;
padding:18px;
z-index:3000;
}

.overlay.show{display:flex}

.modal{
width:100%;
max-width:470px;
background:#141416;
border-radius:28px;
padding:24px;
border:1px solid rgba(255,255,255,.06);
}

.modal h2{font-size:28px;margin-bottom:10px}
.modal p{opacity:.72;margin-bottom:14px}

.modal input,.modal textarea{
width:100%;
padding:13px;
border:none;
border-radius:14px;
background:#202024;
color:#fff;
margin-bottom:10px;
}

.modal textarea{height:90px;resize:none}

.row{
display:flex;
gap:10px;
}

.row button{
flex:1;
padding:13px;
border:none;
border-radius:14px;
font-weight:900;
cursor:pointer;
}

.cancel{background:#2a2a2f;color:#fff}
.confirm{background:linear-gradient(135deg,#d6b36a,#8e6a2f)}

/* ADMIN PANEL */
.admin{
position:fixed;
top:0;
right:-390px;
width:380px;
height:100%;
background:#111214;
z-index:4000;
padding:18px;
overflow:auto;
transition:.3s;
border-left:1px solid rgba(255,255,255,.05);
}

.admin.show{right:0}

.admin h3{
font-size:24px;
margin-bottom:12px;
}

.admin h4{
margin:14px 0 10px;
font-size:16px;
color:#d6b36a;
}

.admin input,.admin textarea{
width:100%;
padding:12px;
border:none;
border-radius:14px;
background:#202024;
color:#fff;
margin-bottom:10px;
}

.admin textarea{height:80px;resize:none}

.admin button{
width:100%;
padding:12px;
border:none;
border-radius:14px;
font-weight:900;
cursor:pointer;
margin-bottom:8px;
background:linear-gradient(135deg,#d6b36a,#8e6a2f);
}

.small{font-size:12px;opacity:.65}

.product-admin{
padding:10px;
background:#191a1d;
border-radius:14px;
margin-bottom:10px;
font-size:13px;
}

@media(max-width:700px){
.hero h1{font-size:38px}
.admin{width:100%;right:-100%}
}
</style>
</head>
<body>

<header>
<div class="logo" onclick="secretTap()">FIT HUB</div>
<button class="shopbtn" onclick="goProducts()">SHOP NOW</button>
</header>

<section class="hero">
<div class="hero-box">
<h1 id="heroTitle">Premium Fashion For Elite Style</h1>
<p id="heroDesc">Luxury designs, premium comfort and timeless confidence.</p>
<button onclick="goProducts()">EXPLORE NOW</button>
</div>
</section>

<section class="section" id="products">
<div class="title">Trending Collection</div>
<div class="grid" id="grid"></div>
</section>

<!-- ORDER -->
<div class="overlay" id="orderBox">
<div class="modal">
<h2>Place Order</h2>
<p id="orderLine"></p>
<input id="custName" placeholder="Full Name">
<input id="custPhone" placeholder="Phone Number">
<textarea id="custAddress" placeholder="Delivery Address"></textarea>
<div class="row">
<button class="cancel" onclick="closeOrder()">Cancel</button>
<button class="confirm" onclick="sendOrder()">Confirm</button>
</div>
</div>
</div>

<!-- LOGIN -->
<div class="overlay" id="loginBox">
<div class="modal">
<h2>Admin Login</h2>
<p>Hidden secure access</p>
<input type="password" id="pass" placeholder="Password">
<div class="row">
<button class="cancel" onclick="closeLogin()">Close</button>
<button class="confirm" onclick="login()">Login</button>
</div>
</div>
</div>

<!-- ADMIN PANEL -->
<div class="admin" id="adminPanel">

<h3>Admin Dashboard</h3>

<h4>Hero Section</h4>
<input id="aTitle" placeholder="Hero Title">
<textarea id="aDesc" placeholder="Hero Description"></textarea>
<button onclick="saveHero()">Save Hero</button>

<h4>WhatsApp Number</h4>
<input id="waNum" placeholder="91xxxxxxxxxx">
<button onclick="saveNumber()">Save Number</button>

<h4>Add Product</h4>
<input id="pName" placeholder="Product Name">
<input id="pPrice" placeholder="Price">
<input id="pImg" placeholder="Image URL">
<button onclick="addProduct()">Add Product</button>

<h4>Manage Products</h4>
<div id="productAdminList"></div>

<button onclick="closeAdmin()">Close Panel</button>
<div class="small">Customers cannot see this panel.</div>

</div>

<script>
let taps=0;
let selectedName="";
let selectedPrice="";
let currentEdit=-1;

let settings=JSON.parse(localStorage.getItem("fit_settings"))||{
title:"Premium Fashion For Elite Style",
desc:"Luxury designs, premium comfort and timeless confidence.",
wa:"917736789255"
};

let products=JSON.parse(localStorage.getItem("fit_products"))||[
{name:"Royal Black Shirt",price:"799",img:"https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf?auto=format&fit=crop&w=900&q=80"},
{name:"Urban White Tee",price:"699",img:"https://images.unsplash.com/photo-1521572267360-ee0c2909d518?auto=format&fit=crop&w=900&q=80"}
];

function saveAll(){
localStorage.setItem("fit_settings",JSON.stringify(settings));
localStorage.setItem("fit_products",JSON.stringify(products));
}

/* LOAD */
function loadSite(){
heroTitle.innerText=settings.title;
heroDesc.innerText=settings.desc;
waNum.value=settings.wa;
renderProducts();
}

/* PRODUCTS */
function renderProducts(){
grid.innerHTML="";
productAdminList.innerHTML="";

products.forEach((p,i)=>{

grid.innerHTML+=`
<div class="card">
<img src="${p.img}">
<div class="card-body">
<h3>${p.name}</h3>
<div class="price">₹${p.price}</div>
<button class="buy" onclick="openOrder('${p.name}','${p.price}')">BUY NOW</button>
</div>
</div>
`;

productAdminList.innerHTML+=`
<div class="product-admin">
<b>${p.name}</b> • ₹${p.price}<br><br>
<button onclick="editProduct(${i})">Edit</button>
<button onclick="deleteProduct(${i})">Delete</button>
</div>
`;

});

saveAll();
}

/* SECRET LOGIN */
function secretTap(){
taps++;
if(taps>=5){
loginBox.classList.add("show");
taps=0;
}
setTimeout(()=>{taps=0},2000);
}

function login(){
if(pass.value==="1234"){
closeLogin();
adminPanel.classList.add("show");
}else{
alert("Wrong Password");
}
}

function closeLogin(){loginBox.classList.remove("show")}
function closeAdmin(){adminPanel.classList.remove("show")}

/* HERO */
function saveHero(){
settings.title=aTitle.value || settings.title;
settings.desc=aDesc.value || settings.desc;
loadSite();
alert("Hero Updated");
}

/* NUMBER */
function saveNumber(){
settings.wa=waNum.value.trim();
saveAll();
alert("WhatsApp Updated");
}

/* ADD PRODUCT */
function addProduct(){
let n=pName.value.trim();
let pr=pPrice.value.trim();
let img=pImg.value.trim();

if(!n||!pr||!img){alert("Fill all");return;}

products.push({name:n,price:pr,img:img});
renderProducts();

pName.value="";
pPrice.value="";
pImg.value="";
}

/* DELETE */
function deleteProduct(i){
products.splice(i,1);
renderProducts();
}

/* EDIT */
function editProduct(i){
let p=products[i];

let n=prompt("Product Name",p.name);
if(n===null)return;

let pr=prompt("Price",p.price);
if(pr===null)return;

let img=prompt("Image URL",p.img);
if(img===null)return;

products[i]={name:n,price:pr,img:img};
renderProducts();
}

/* ORDER */
function openOrder(n,p){
selectedName=n;
selectedPrice=p;
orderLine.innerText=n+" • ₹"+p;
orderBox.classList.add("show");
}

function closeOrder(){
orderBox.classList.remove("show");
}

function sendOrder(){
let n=custName.value.trim();
let p=custPhone.value.trim();
let a=custAddress.value.trim();

if(!n||!p||!a){alert("Fill all details");return;}

let msg=`Order

Product: ${selectedName}
Price: ₹${selectedPrice}

Name: ${n}
Phone: ${p}
Address: ${a}`;

window.open("https://wa.me/"+settings.wa+"?text="+encodeURIComponent(msg));
closeOrder();
}

/* SCROLL */
function goProducts(){
products.scrollIntoView;
document.getElementById("products").scrollIntoView();
}

loadSite();
</script>

</body>
  </html>
