<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FIT HUB V5 ULTRA PRO</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:Arial;
background:#07070a;
color:#fff;
}

/* HEADER */
header{
position:sticky;top:0;
display:flex;justify-content:space-between;align-items:center;
padding:16px;
background:rgba(10,10,15,.92);
backdrop-filter:blur(14px);
border-bottom:1px solid rgba(255,255,255,.06);
}
.logo{
font-size:28px;font-weight:900;
color:#9d4edd;
cursor:pointer;
text-shadow:0 0 14px #9d4edd;
}
.btn{
padding:10px 14px;
border:none;
border-radius:12px;
background:#9d4edd;
color:#fff;
font-weight:700;
cursor:pointer;
}

/* LAYOUT */
.wrap{max-width:1200px;margin:auto;padding:20px}

input,select,textarea{
width:100%;
padding:12px;
margin:6px 0;
border:none;
border-radius:12px;
background:#15151e;
color:#fff;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:16px;
}

/* CARD */
.card{
background:#121218;
border-radius:16px;
overflow:hidden;
cursor:pointer;
transition:.2s;
}
.card:hover{transform:translateY(-5px)}
.card img{width:100%;height:240px;object-fit:cover}
.info{padding:12px}
.price{color:#c77dff;font-weight:900}

/* POPUP */
.popup{
position:fixed;inset:0;
background:rgba(0,0,0,.85);
display:none;
justify-content:center;
align-items:center;
padding:20px;
z-index:5000;
}
.popup.show{display:flex}
.box{
max-width:520px;
width:100%;
background:#111118;
padding:16px;
border-radius:18px;
}
.box img{
width:100%;
height:260px;
object-fit:cover;
border-radius:12px;
}
.row{display:flex;gap:10px;margin-top:10px}
.small{
flex:1;
padding:10px;
border:none;
border-radius:10px;
background:#1e1e2a;
color:#fff;
cursor:pointer;
}

/* PANELS */
.page{display:none;padding:20px}
.page.show{display:block}

.panel{
position:fixed;
top:0;
right:-420px;
width:380px;
height:100%;
background:#0d0d13;
padding:18px;
transition:.3s;
overflow:auto;
z-index:6000;
}
.panel.show{right:0}

footer{text-align:center;padding:30px;opacity:.6}
</style>
</head>

<body>

<header>
<div class="logo" id="logo">FIT HUB V5</div>
<button class="btn" onclick="openCart()">Cart (<span id="cartCount">0</span>)</button>
</header>

<!-- HOME -->
<div id="home">
<div class="wrap">

<input id="search" placeholder="Search..." oninput="render()">

<select id="filter" onchange="render()">
<option value="">All</option>
<option>Shirt</option>
<option>Tshirt</option>
<option>Hoodie</option>
<option>Jeans</option>
</select>

<div class="grid" id="grid"></div>

</div>
</div>

<!-- PRODUCT PAGE -->
<div id="productPage" class="page">
<button class="btn" onclick="back()">⬅ Back</button>

<div class="box">
<img id="pimg">
<h2 id="pname"></h2>
<div class="price" id="pprice"></div>

<select id="size">
<option>S</option><option>M</option><option>L</option><option>XL</option>
</select>

<input id="phone" placeholder="Phone">
<textarea id="address" placeholder="Address"></textarea>

<div class="row">
<button class="small" onclick="order()">WhatsApp Order</button>
<button class="small" onclick="addCart(current.id)">Add Cart</button>
<button class="small" onclick="addWish(current.id)">Wishlist ❤️</button>
</div>

</div>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="box">
<img id="ppimg">
<h2 id="ppname"></h2>
<div class="price" id="ppprice"></div>

<div class="row">
<button class="small" onclick="openPage()">Open Page</button>
<button class="small" onclick="closePopup()">Close</button>
</div>
</div>
</div>

<!-- CART PANEL -->
<div class="panel" id="cartPanel">
<h2>Cart</h2>
<div id="cartList"></div>
<button class="small" onclick="closeCart()">Close</button>
</div>

<!-- WISHLIST PANEL -->
<div class="panel" id="wishPanel">
<h2>Wishlist ❤️</h2>
<div id="wishList"></div>
<button class="small" onclick="closeWish()">Close</button>
</div>

<!-- ADMIN PANEL -->
<div class="panel" id="admin">
<h2>Admin Panel</h2>

<input id="aname" placeholder="Product Name">
<input id="aprice" placeholder="Price">
<input id="acat" placeholder="Category">
<input type="file" id="aimg">

<button class="btn" onclick="addProduct()">Add Product</button>
<button class="small" onclick="closeAdmin()">Close</button>

<hr style="margin:10px 0;opacity:.2">

<h3>Orders (Local)</h3>
<div id="orders"></div>

</div>

<footer>FIT HUB V5 ULTRA PRO</footer>

<script>

/* ADMIN */
let pass="@yadh4u1";
let taps=0;

/* DATA */
let current=null;
let cart=[];
let wish=[];
let orders=JSON.parse(localStorage.getItem("orders")||"[]");

let products=JSON.parse(localStorage.getItem("v5")||"[]");

if(products.length===0){
products=[
{id:1,name:"Royal Shirt",price:"799",cat:"Shirt",img:"https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf?auto=format&fit=crop&w=900&q=80"},
{id:2,name:"Urban Tee",price:"699",cat:"Tshirt",img:"https://images.unsplash.com/photo-1521572267360-ee0c2909d518?auto=format&fit=crop&w=900&q=80"}
];
save();
}

function save(){
localStorage.setItem("v5",JSON.stringify(products));
localStorage.setItem("orders",JSON.stringify(orders));
}

/* ADMIN OPEN */
logo.onclick=()=>{
taps++;
if(taps>=5){
let p=prompt("Password");
if(p===pass) admin.classList.add("show");
taps=0;
}
}

/* IMAGE BASE64 */
function toBase(file,cb){
let r=new FileReader();
r.onload=()=>cb(r.result);
r.readAsDataURL(file);
}

/* ADD PRODUCT */
function addProduct(){
let file=aimg.files[0];
if(!file)return alert("Upload image");

toBase(file,(img)=>{
products.push({
id:Date.now(),
name:aname.value,
price:aprice.value,
cat:acat.value,
img:img
});
save();
render();
});
}

/* RENDER */
function render(){
grid.innerHTML="";
let q=search.value.toLowerCase();
let f=filter.value;

products.filter(p=>{
return p.name.toLowerCase().includes(q)&&(f==""||p.cat==f);
}).forEach(p=>{
grid.innerHTML+=`
<div class="card" onclick="openPopup(${p.id})">
<img src="${p.img}">
<div class="info">
<h3>${p.name}</h3>
<div class="price">₹${p.price}</div>
</div>
</div>`;
});
}

/* POPUP */
function openPopup(id){
current=products.find(x=>x.id===id);
ppimg.src=current.img;
ppname.innerText=current.name;
ppprice.innerText="₹"+current.price;
popup.classList.add("show");
}
function closePopup(){popup.classList.remove("show");}

/* FULL PAGE */
function openPage(){
popup.classList.remove("show");
home.style.display="none";
productPage.classList.add("show");

pimg.src=current.img;
pname.innerText=current.name;
pprice.innerText="₹"+current.price;
}
function back(){
home.style.display="block";
productPage.classList.remove("show");
}

/* CART */
function addCart(id){
cart.push(id);
cartCount.innerText=cart.length;
renderCart();
}
function openCart(){
cartPanel.classList.add("show");
renderCart();
}
function closeCart(){cartPanel.classList.remove("show");}

function renderCart(){
cartList.innerHTML="";
cart.forEach(id=>{
let p=products.find(x=>x.id===id);
if(p){
cartList.innerHTML+=`<div>${p.name} - ₹${p.price}</div>`;
}
});
}

/* WISHLIST */
function addWish(id){
wish.push(id);
wishPanel.classList.add("show");
renderWish();
}
function closeWish(){wishPanel.classList.remove("show");}

function renderWish(){
wishList.innerHTML="";
wish.forEach(id=>{
let p=products.find(x=>x.id===id);
if(p){
wishList.innerHTML+=`<div>${p.name}</div>`;
}
});
}

/* ORDER */
function order(){

let o={
product:current.name,
price:current.price,
size:size.value,
phone:phone.value,
address:address.value,
time:new Date().toLocaleString()
};

orders.push(o);
save();

let msg=`Order
Product:${o.product}
Price:${o.price}
Size:${o.size}
Phone:${o.phone}
Address:${o.address}`;

window.open("https://wa.me/917736789255?text="+encodeURIComponent(msg));
}

/* ADMIN ORDERS */
setInterval(()=>{
ordersList.innerHTML=orders.map(o=>
`<div style="padding:6px;border-bottom:1px solid #222">
${o.product} - ${o.phone}
</div>`).join("");
},1000);

render();

</script>

</body>
</html>
