<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fit Hub</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5;}

header{
background:#111;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

nav button{
margin:5px;
padding:8px;
border:none;
background:white;
cursor:pointer;
border-radius:5px;
}

section{display:none;padding:15px;}
.active{display:block;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
text-align:center;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:8px;
}

button{
background:#111;
color:white;
padding:8px;
border:none;
border-radius:5px;
cursor:pointer;
margin:3px;
}

input,textarea{
width:90%;
padding:10px;
margin:5px 0;
}
</style>
</head>

<body>

<header>
FIT HUB

<nav>
<button onclick="show('home')">Home</button>
<button onclick="show('products')">Products</button>
<button onclick="show('order')">Order</button>
<button onclick="login()">Admin</button>
</nav>

</header>

<!-- HOME -->
<section id="home" class="active">
<h2>Welcome to Fit Hub</h2>
<p>Premium Clothing Store</p>
</section>

<!-- PRODUCTS -->
<section id="products">
<h2>Products</h2>

<div id="adminBox" style="display:none;">
<h3>Admin Panel</h3>
<input id="pname" placeholder="Product Name">
<input id="pprice" placeholder="Price">
<input id="pimg" placeholder="Image URL">
<button onclick="add()">Add Product</button>
</div>

<div class="grid" id="list"></div>
</section>

<!-- ORDER -->
<section id="order">
<h2>Place Order</h2>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<textarea id="address" placeholder="Address"></textarea>

<button onclick="send()">Send Order</button>
</section>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

/* 🔥 FIREBASE CONFIG (replace yours) */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "YOUR_DB_URL",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_BUCKET",
  messagingSenderId: "XXXX",
  appId: "XXXX"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let isAdmin=false;
let selectedName="";
let selectedPrice="";

/* PAGE */
window.show=function(p){
document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
document.getElementById(p).classList.add("active");
}

/* LOAD PRODUCTS */
function load(){
const dbRef=ref(db,"products");
onValue(dbRef,(snap)=>{
let data=snap.val()||{};
let box=document.getElementById("list");
box.innerHTML="";

Object.keys(data).forEach(k=>{
let p=data[k];

box.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<p>₹${p.price}</p>

<button onclick="buy('${p.name}',${p.price})">Buy</button>

${isAdmin ? `<button onclick="del('${k}')">Delete</button>` : ""}
</div>`;
});
});
}

/* BUY */
window.buy=function(name,price){
selectedName=name;
selectedPrice=price;
show('order');
}

/* WHATSAPP ORDER */
window.send=function(){

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let address=document.getElementById("address").value;

let msg=`Order:
Product: ${selectedName}
Price: ₹${selectedPrice}
Name: ${name}
Phone: ${phone}
Address: ${address}`;

let number="917736789255";

window.open("https://wa.me/"+number+"?text="+encodeURIComponent(msg));
}

/* ADMIN LOGIN */
window.login=function(){
let pass=prompt("Enter Password");
if(pass==="1234"){
isAdmin=true;
document.getElementById("adminBox").style.display="block";
alert("Admin ON");
load();
}else{
alert("Wrong Password");
}
}

/* ADD PRODUCT */
window.add=function(){
let name=document.getElementById("pname").value;
let price=document.getElementById("pprice").value;
let img=document.getElementById("pimg").value;

set(ref(db,"products/"+Date.now()),{
name,price,img
});
}

/* DELETE */
window.del=function(key){
set(ref(db,"products/"+key),null);
}

load();

</script>

</body>
</html>
