<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fit Hub</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5;}

/* HEADER */
header{
background:#111;color:white;
padding:15px;
text-align:center;
font-size:22px;
}

/* MENU */
nav{
margin-top:10px;
}
nav button{
background:white;
color:black;
border:none;
padding:8px 12px;
margin:5px;
border-radius:5px;
cursor:pointer;
}

/* SECTIONS */
section{display:none;padding:20px;}
.active{display:block;}

/* HERO */
.hero{
height:250px;
background:url('https://images.unsplash.com/photo-1521334884684-d80222895322') center/cover;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:28px;
font-weight:bold;
}

/* PRODUCTS */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
text-align:center;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:8px;
}

button.buy{
background:#111;
color:white;
border:none;
padding:8px;
border-radius:5px;
cursor:pointer;
}

/* FORM */
input,textarea{
width:90%;
padding:10px;
margin:5px 0;
}

</style>
</head>

<body>

<header>
FIT HUB

<nav>
<button onclick="show('home')">Home</button>
<button onclick="show('products')">Products</button>
<button onclick="show('contact')">Contact</button>
</nav>

</header>

<!-- HOME -->
<section id="home" class="active">
<div class="hero">
Premium Fashion Store
</div>
<h2 style="text-align:center;">Welcome to Fit Hub</h2>
<p style="text-align:center;">Luxury Clothing Collection</p>
</section>

<!-- PRODUCTS -->
<section id="products">

<h2>Our Products</h2>

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf">
<h3>Black Shirt</h3>
<p>₹799</p>
<button class="buy" onclick="order('Black Shirt',799)">Buy</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1521572267360-ee0c2909d518">
<h3>White Shirt</h3>
<p>₹699</p>
<button class="buy" onclick="order('White Shirt',699)">Buy</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1520975958225-0c7f5c0c1f2d">
<h3>Hoodie</h3>
<p>₹1299</p>
<button class="buy" onclick="order('Hoodie',1299)">Buy</button>
</div>

</div>

</section>

<!-- CONTACT -->
<section id="contact">

<h2>Order / Contact</h2>

<input type="text" id="name" placeholder="Name">
<input type="text" id="phone" placeholder="Phone">
<textarea id="address" placeholder="Address"></textarea>

<button onclick="send()">Send Order</button>

</section>

<script>

/* PAGE SWITCH */
function show(page){
document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
document.getElementById(page).classList.add("active");
}

/* ORDER */
let selectedProduct = "";
let selectedPrice = 0;

function order(name,price){
selectedProduct = name;
selectedPrice = price;
show('contact');
}

/* WHATSAPP ORDER */
function send(){

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let address=document.getElementById("address").value;

let msg =
"Order:%0AProduct: "+selectedProduct+
"%0APrice: ₹"+selectedPrice+
"%0AName: "+name+
"%0APhone: "+phone+
"%0AAddress: "+address;

window.open("https://wa.me/91YOURNUMBER?text="+msg);

}

</script>

</body>
</html>
