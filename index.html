<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fit Hub</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5;}
header{background:#111;color:white;padding:15px;text-align:center;}
section{padding:15px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;}
.card{background:white;padding:10px;border-radius:10px;text-align:center;}
.card img{width:100%;height:180px;object-fit:cover;border-radius:8px;}
button{background:#111;color:white;padding:8px;border:none;border-radius:5px;cursor:pointer;margin:3px;}
input,textarea{width:90%;padding:10px;margin:5px 0;}
</style>
</head>

<body>

<header>FIT HUB</header>

<section>

<h3>Admin Login</h3>
<button onclick="login()">Admin Mode</button>

<div id="adminPanel" style="display:none;">
<h3>Add Product</h3>
<input id="pname" placeholder="Product Name">
<input id="pprice" placeholder="Price">
<input id="pimg" placeholder="Image URL">
<button onclick="add()">Add Product</button>
</div>

<h3>Products</h3>
<div class="grid" id="list"></div>

</section>

<!-- Firebase -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

/* 🔥 YOUR FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyCCZROy6wzevuizlgRXgjY05VQBWRicNMY",
  authDomain: "fithub-9a878.firebaseapp.com",
  databaseURL: "https://fithub-9a878-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "fithub-9a878",
  storageBucket: "fithub-9a878.firebasestorage.app",
  messagingSenderId: "541686780215",
  appId: "1:541686780215:web:c0dd12bf5353f23eaecab2"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let isAdmin=false;

/* LOAD PRODUCTS (REALTIME AUTO SYNC) */
function load(){
const dbRef = ref(db,"products");

onValue(dbRef,(snap)=>{
let data = snap.val() || {};
let box = document.getElementById("list");
box.innerHTML = "";

Object.keys(data).forEach(k=>{
let p = data[k];

box.innerHTML += `
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<p>₹${p.price}</p>

<button onclick="buy('${p.name}',${p.price})">Buy</button>

${isAdmin ? `<button onclick="del('${k}')">Delete</button>` : ""}
</div>`;
});
});
}

/* ADD PRODUCT */
window.add = function(){
let name = document.getElementById("pname").value;
let price = document.getElementById("pprice").value;
let img = document.getElementById("pimg").value;

set(ref(db,"products/"+Date.now()),{
name,price,img
});
}

/* DELETE PRODUCT */
window.del = function(key){
set(ref(db,"products/"+key),null);
}

/* ADMIN LOGIN */
window.login = function(){
let pass = prompt("Enter Password");
if(pass === "1234"){
isAdmin = true;
document.getElementById("adminPanel").style.display = "block";
alert("Admin Mode ON");
load();
}else{
alert("Wrong Password");
}
}

/* BUY → WHATSAPP */
window.buy = function(name,price){

let phone = prompt("Phone");
let address = prompt("Address");

let msg = `Order:
Product: ${name}
Price: ₹${price}
Phone: ${phone}
Address: ${address}`;

let number = "917736789255";

window.open("https://wa.me/"+number+"?text="+encodeURIComponent(msg));
}

load();

</script>

</body>
</html>
