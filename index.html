<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fit Hub</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5;}

header{
background:#111;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

nav button{
margin:5px;
padding:8px 10px;
border:none;
background:white;
cursor:pointer;
border-radius:5px;
}

section{display:none;padding:15px;}
.active{display:block;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
text-align:center;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:8px;
}

button{
padding:8px;
border:none;
background:#111;
color:white;
border-radius:5px;
cursor:pointer;
margin:3px;
}

input,textarea{
width:90%;
padding:10px;
margin:5px 0;
}

.adminBox{
background:#fff;
padding:10px;
border-radius:10px;
margin:10px 0;
}
</style>
</head>

<body>

<header>
FIT HUB

<nav>
<button onclick="show('home')">Home</button>
<button onclick="show('products')">Products</button>
<button onclick="show('order')">Order</button>
<button onclick="loginAdmin()">Admin</button>
</nav>

</header>

<!-- HOME -->
<section id="home" class="active">
<h2>Welcome to Fit Hub</h2>
<p>Luxury Clothing Store</p>
</section>

<!-- PRODUCTS -->
<section id="products">
<h2>Products</h2>
<div class="grid" id="list"></div>

<div class="adminBox" id="adminBox" style="display:none;">
<h3>Admin Panel</h3>
<input id="pname" placeholder="Product Name">
<input id="pprice" placeholder="Price">
<input id="pimg" placeholder="Image URL">
<button onclick="addProduct()">Add Product</button>
</div>

</section>

<!-- ORDER -->
<section id="order">
<h2>Place Order</h2>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<textarea id="address" placeholder="Address"></textarea>

<select id="delivery">
<option>Standard</option>
<option>Bike Delivery</option>
<option>Express Cycle</option>
</select>

<button onclick="sendOrder()">Send Order</button>
</section>

<script>

let isAdmin=false;

let products = JSON.parse(localStorage.getItem("products")) || [
{name:"Black Shirt",price:799,img:"https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf"},
{name:"White Shirt",price:699,img:"https://images.unsplash.com/photo-1521572267360-ee0c2909d518"}
];

let selectedProduct="";
let selectedPrice=0;

/* PAGE */
function show(p){
document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
document.getElementById(p).classList.add("active");
}

/* LOAD PRODUCTS */
function load(){
let box=document.getElementById("list");
box.innerHTML="";

products.forEach((p,i)=>{
box.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<p>₹${p.price}</p>

<button onclick="buy('${p.name}',${p.price})">Buy</button>

${isAdmin ? `
<button onclick="edit(${i})">Edit</button>
<button onclick="del(${i})">Delete</button>
` : ""}
</div>`;
});

localStorage.setItem("products",JSON.stringify(products));
}

/* BUY */
function buy(name,price){
selectedProduct=name;
selectedPrice=price;
show('order');
}

/* ORDER */
function sendOrder(){

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let address=document.getElementById("address").value;
let delivery=document.getElementById("delivery").value;

let msg =
`Order:
Product: ${selectedProduct}
Price: ₹${selectedPrice}
Name: ${name}
Phone: ${phone}
Address: ${address}
Delivery: ${delivery}`;

let number="917736789255";

window.open("https://wa.me/"+number+"?text="+encodeURIComponent(msg));

}

/* ADMIN LOGIN */
function loginAdmin(){
let pass=prompt("Enter Admin Password");

if(pass==="1234"){
isAdmin=true;
document.getElementById("adminBox").style.display="block";
alert("Admin Mode ON");
load();
}else{
alert("Wrong Password");
}
}

/* ADD */
function addProduct(){
let name=document.getElementById("pname").value;
let price=document.getElementById("pprice").value;
let img=document.getElementById("pimg").value;

products.push({name,price,img});
load();
}

/* EDIT */
function edit(i){
let name=prompt("Edit Name",products[i].name);
let price=prompt("Edit Price",products[i].price);

products[i].name=name;
products[i].price=price;

load();
}

/* DELETE */
function del(i){
products.splice(i,1);
load();
}

load();

</script>

</body>
</html>
