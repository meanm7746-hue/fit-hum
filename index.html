<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fit Hub</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5;}

header{
background:#111;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

nav button{
margin:5px;
padding:8px;
border:none;
background:white;
cursor:pointer;
border-radius:5px;
}

section{display:none;padding:15px;}
.active{display:block;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
text-align:center;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:8px;
}

button{
background:#111;
color:white;
padding:8px;
border:none;
border-radius:5px;
cursor:pointer;
margin:3px;
}

input,textarea{
width:90%;
padding:10px;
margin:5px 0;
}
</style>
</head>

<body>

<header>
FIT HUB

<nav>
<button onclick="show('home')">Home</button>
<button onclick="show('products')">Products</button>
<button onclick="show('order')">Order</button>
</nav>

</header>

<!-- HOME -->
<section id="home" class="active">
<h2>Welcome to Fit Hub</h2>
<p>Premium Clothing Store</p>
</section>

<!-- PRODUCTS -->
<section id="products">

<h2>Products</h2>

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf">
<h3>Black Shirt</h3>
<p>₹799</p>
<button onclick="buy('Black Shirt',799)">Buy</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1521572267360-ee0c2909d518">
<h3>White Shirt</h3>
<p>₹699</p>
<button onclick="buy('White Shirt',699)">Buy</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1520975958225-0c7f5c0c1f2d">
<h3>Hoodie</h3>
<p>₹1299</p>
<button onclick="buy('Hoodie',1299)">Buy</button>
</div>

</div>

</section>

<!-- ORDER -->
<section id="order">
<h2>Place Order</h2>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<textarea id="address" placeholder="Address"></textarea>

<button onclick="send()">Send Order</button>
</section>

<script>

let selectedName="";
let selectedPrice="";

/* PAGE SWITCH */
function show(p){
document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
document.getElementById(p).classList.add("active");
}

/* BUY PRODUCT */
function buy(name,price){
selectedName=name;
selectedPrice=price;
show('order');
}

/* WHATSAPP ORDER */
function send(){

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let address=document.getElementById("address").value;

let msg=`Order:
Product: ${selectedName}
Price: ₹${selectedPrice}
Name: ${name}
Phone: ${phone}
Address: ${address}`;

let number="917736789255";

window.open("https://wa.me/"+number+"?text="+encodeURIComponent(msg));

}

</script>

</body>
</html>
